name: Daily News Brief
on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build-brief:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Run the news agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node agent.js
      - name: Commit and push the updated dashboard
        run: |
          git config user.name "News Agent Bot"
          git config user.email "actions@github.com"
          git add index.html
          git commit -m "Daily brief update" || echo "No changes to commit"
          git push
